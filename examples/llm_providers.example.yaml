# LLM Provider 配置示例
#
# 本文件展示四种 provider 类型（openai-native / openai-compatible /
# anthropic-native / anthropic-compatible）的完整配置格式。
#
# 重要约束：
# - 不包含任何真实 API key
# - 只使用 api_key_env（环境变量名），不使用 api_key（inline key）
# - base_url / model 可写死，也可通过 base_url_env / model_env 引用 env
# - model 与 model_env 互斥，base_url 与 base_url_env 互斥
# - compatible provider 必须提供 base_url 或 base_url_env
#
# 第三方转接 API 推荐：把 key / base_url / model 都放入显式 .env 文件，
# YAML 中仅通过 api_key_env / base_url_env / model_env 引用。
#
# 使用方式（真实 LLM dogfood）：
#   1. 复制本文件到 agent_tool_harness/llm_providers.yaml
#   2. 创建 .env 文件（不要 commit）：
#        AGENT_TOOL_HARNESS_OPENAI_API_KEY=sk-xxxx
#        AGENT_TOOL_HARNESS_OPENAI_COMPAT_API_KEY=sk-xxxx
#        AGENT_TOOL_HARNESS_OPENAI_COMPAT_BASE_URL=https://api.deepseek.com
#        AGENT_TOOL_HARNESS_OPENAI_COMPAT_MODEL=deepseek-chat
#   3. 真实调用：
#        python -m agent_tool_harness.cli run \
#          --core-flow --judge-provider llm \
#          --llm-config examples/llm_providers.example.yaml \
#          --llm-provider openai-compatible \
#          --env-file ./.env \
#          --live --confirm-i-have-real-key \

providers:

  # ------------------------------------------------------------------
  # OpenAI native — 使用官方 OpenAI API endpoint
  # ------------------------------------------------------------------
  openai-native:
    family: openai
    compatibility: native
    model: gpt-4.1-mini
    api_key_env: AGENT_TOOL_HARNESS_OPENAI_API_KEY
    timeout_seconds: 30
    max_tokens: 4096
    temperature: 0.1

  # ------------------------------------------------------------------
  # OpenAI-compatible — 第三方转接 API（推荐所有值从 env file 读取）
  # 示例 .env 中需要：
  #   AGENT_TOOL_HARNESS_OPENAI_COMPAT_API_KEY=...
  #   AGENT_TOOL_HARNESS_OPENAI_COMPAT_BASE_URL=...
  #   AGENT_TOOL_HARNESS_OPENAI_COMPAT_MODEL=...
  # ------------------------------------------------------------------
  openai-compatible:
    family: openai
    compatibility: compatible
    api_key_env: AGENT_TOOL_HARNESS_OPENAI_COMPAT_API_KEY
    base_url_env: AGENT_TOOL_HARNESS_OPENAI_COMPAT_BASE_URL
    model_env: AGENT_TOOL_HARNESS_OPENAI_COMPAT_MODEL
    timeout_seconds: 60

  # ------------------------------------------------------------------
  # Anthropic native — 使用官方 Anthropic Messages API
  # ------------------------------------------------------------------
  anthropic-native:
    family: anthropic
    compatibility: native
    model: claude-sonnet-4-6-20250514
    api_key_env: AGENT_TOOL_HARNESS_ANTHROPIC_API_KEY
    max_tokens: 4096

  # ------------------------------------------------------------------
  # Anthropic-compatible — 第三方转接 API（推荐所有值从 env file 读取）
  # 示例 .env 中需要：
  #   AGENT_TOOL_HARNESS_ANTHROPIC_COMPAT_API_KEY=...
  #   AGENT_TOOL_HARNESS_ANTHROPIC_COMPAT_BASE_URL=...
  #   AGENT_TOOL_HARNESS_ANTHROPIC_COMPAT_MODEL=...
  # ------------------------------------------------------------------
  anthropic-compatible:
    family: anthropic
    compatibility: compatible
    api_key_env: AGENT_TOOL_HARNESS_ANTHROPIC_COMPAT_API_KEY
    base_url_env: AGENT_TOOL_HARNESS_ANTHROPIC_COMPAT_BASE_URL
    model_env: AGENT_TOOL_HARNESS_ANTHROPIC_COMPAT_MODEL
    timeout_seconds: 45
