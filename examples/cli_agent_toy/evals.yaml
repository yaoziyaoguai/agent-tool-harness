# Toy CLI Agent — 评测场景定义

evals:
  - id: toy-cli-search
    name: Toy CLI agent search evaluation
    category: integration
    split: test
    realism_level: toy
    complexity: low
    source: test
    user_prompt: 使用知识库搜索查找最近的错误根因
    initial_context:
      query: recent error
    expected_tool_behavior:
      required_tools:
        - knowledge.search
    judge:
      rules:
        - type: must_call_tool
          tool: knowledge.search
        - type: must_use_evidence
    verifiable_outcome:
      expected_root_cause: timeout
      evidence_ids:
        - ev-001
    success_criteria:
      - 结论引用证据

  - id: toy-cli-both-tools
    name: Toy CLI agent both tools evaluation
    category: integration
    split: test
    realism_level: toy
    complexity: low
    source: test
    user_prompt: 搜索知识库并查询 trace 以定位 both-tools 错误根因
    initial_context:
      query: recent error
    expected_tool_behavior:
      required_tools:
        - knowledge.search
        - trace.lookup
    judge:
      rules:
        - type: must_call_tool
          tool: knowledge.search
        - type: must_call_tool
          tool: trace.lookup
        - type: must_use_evidence
    verifiable_outcome:
      expected_root_cause: timeout
      evidence_ids:
        - ev-001
    success_criteria:
      - 结论引用证据
